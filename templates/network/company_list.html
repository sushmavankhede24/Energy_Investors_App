{% extends "base.html" %}
{% block content %}

<div class="container py-5">
  <h1 class="mb-4 text-center fw-bold" style="color:#2c2c2c;">
    🌐 Our Network
  </h1>

  <div class="row g-4">
    {% for c in companies %}
    
      <div class="col-md-6 col-lg-4">
        <div class="card h-100 shadow-sm border-0" style="border-radius:12px;">
          
          <div class="card-body d-flex flex-column">
            
            <!-- Company Name -->
            <h5 class="card-title fw-bold" style="color:#2c2c2c;">
              {{ c.name }}
            </h5>

            <!-- Country -->
            <p class="text-muted mb-2">
              📍 {{ c.country }}
            </p>

            <!-- Description -->
            <p class="card-text" style="font-size:14px;">
              {{ c.description|default:"No description available." }}
            </p>

            <!-- Spacer to push button down -->
            <div class="mt-auto">
              <a href="{{ c.website }}" target="_blank" 
                 class="btn w-100"
                 style="background:#d4af37; color:white; border:none;">
                Visit Website →
              </a>
            </div>

          </div>

        </div>
      </div>

    {% empty %}
      <div class="col-12 text-center">
        <p class="text-muted">No companies yet.</p>
      </div>
    {% endfor %}
  </div>
</div>

{% endblock %}
